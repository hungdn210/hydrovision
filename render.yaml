services:
  - type: web
    name: hydrovision
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: HYDROVISION_DATA_DIR
        value: /opt/render/project/src/data
      - key: R2_SYNC_PREFIXES
        value: "Mekong"
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
